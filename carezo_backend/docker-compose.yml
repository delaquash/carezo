
services:
  # postgres details
  postgres:
    image: postgres:16-alpine
    container_name: carezo-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-carezo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-carezo_user} -d ${DB_NAME:-carezo_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - carezo-network
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: carezo_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:- }
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - carezo-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carezo_app
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    networks:
      - carezo-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: carezo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carezo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - carezo-network
    restart: unless-stopped
    profiles:
      - tools # Only start when explicitly requested

networks:
  carezo-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
